<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAHUL BORA ENGINEER'S & ASSOCIATES</title>
    <link rel="icon" type="image/png" href="rahulbora_logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1a3a3a, #134e5e, #71b280);
            background-size: 600% 600%;
            animation: gradientBG 20s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            25% { background-position: 50% 100%; }
            50% { background-position: 100% 50%; }
            75% { background-position: 50% 0%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 900px;
            width: 100%;
            text-align: center;
        }

        .content-wrapper {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-direction: row-reverse;
        }

        @media (max-width: 768px) {
            .content-wrapper {
                flex-direction: column;
                align-items: center;
            }
        }

        .right-section {
            flex: 0 0 250px;
        }

        @media (max-width: 768px) {
            .right-section {
                flex: 1;
                width: 100%;
                max-width: 500px;
            }
        }

        .header {
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 1.6rem;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 0.95rem;
            opacity: 0.85;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .logo {
            width: 150px;
            height: 150px;
            border-radius: 24px;
            object-fit: contain;
            margin-bottom: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            box-shadow: 
                0 8px 32px rgba(0,0,0,0.3),
                0 0 0 1px rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            transition: all 0.4s ease;
        }

        .logo:hover {
            transform: scale(1.05) rotate(2deg);
            box-shadow: 
                0 12px 40px rgba(0,0,0,0.4),
                0 0 0 1px rgba(255,255,255,0.2);
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        @media (max-width: 480px) {
            .links-grid {
                grid-template-columns: 1fr;
            }
        }

        .link-card {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 18px 20px;
            text-decoration: none;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 
                0 4px 20px rgba(0,0,0,0.1),
                0 0 0 1px rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }

        .link-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s ease;
        }

        .link-card:hover::before {
            left: 100%;
        }

        .link-card:hover {
            transform: scale(1.03);
            box-shadow: 
                0 8px 30px rgba(0,0,0,0.2),
                0 0 0 1px rgba(255,255,255,0.2);
            background: rgba(255,255,255,1);
        }

        .link-card i {
            font-size: 1.6rem;
            width: 32px;
            transition: transform 0.3s ease;
        }

        .link-card:hover i {
            transform: scale(1.15);
        }

        .link-card.instagram i { color: #e4405f; }
        .link-card.facebook i { color: #1877f2; }
        .link-card.website i { color: #2a5298; }
        .link-card.contact i { color: #25d366; }
        .link-card.more i { color: #ff6b35; }
        .link-card.address i { color: #e74c3c; }
        .link-card.reviews i { color: #4285f4; }
        .link-card.feedback i { color: #9b59b6; }

        .qr-section {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .qr-section h3 {
            color: #1a1a2e;
            font-size: 0.95rem;
            margin-bottom: 15px;
        }

        #qrcode {
            display: inline-block;
            padding: 12px;
            background: white;
            border: 2px dashed #e74c3c;
            border-radius: 12px;
        }

        #qrcode img {
            width: 180px;
            height: 180px;
        }

        .qr-section p {
            color: #666;
            font-size: 0.75rem;
            margin-top: 10px;
        }

        .download-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }

        .link-card h3 {
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .footer {
            color: white;
            margin-top: 35px;
            font-size: 0.85rem;
            opacity: 0.7;
            font-weight: 300;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        new QRCode(document.getElementById("qrcode"), {
            text: "https://tanmay0329.github.io/rahul-bora-engineers-associates/",
            width: 180,
            height: 180,
            colorDark: "#1a1a2e",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });

        function downloadQR() {
            const qrCanvas = document.querySelector("#qrcode canvas");
            const link = document.createElement("a");
            link.download = "rahul-bora-engineers-qr.png";
            link.href = qrCanvas.toDataURL("image/png");
            link.click();
        }
